{% extends "base.html" %}
{% block content %}
<section class="home-card approval-card center narrow">
  <div class="status-icon">⌛</div>
  <h1>Waiting for approval</h1>
  <p>{{ user.display_name }} is saved, but the private pages stay locked until the admin approves the account.</p>
  <div class="muted">Key: {{ user.public_key }}</div>
  <div class="muted">Once approved, the receipt editor and inbox open automatically.</div>
</section>
{% endblock %}
